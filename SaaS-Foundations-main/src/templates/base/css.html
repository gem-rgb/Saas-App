{% load static %}
<!-- Tailwind CSS via CDN -->
<link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
    darkMode: 'class',
    theme: {
        extend: {
            colors: {
                primary: {"50":"#ecfeff","100":"#cffafe","200":"#a5f3fc","300":"#67e8f9","400":"#22d3ee","500":"#06b6d4","600":"#0891b2","700":"#0e7490","800":"#155e75","900":"#164e63","950":"#082f49"},
                accent: {"50":"#f0fdfa","100":"#ccfbf1","200":"#99f6e4","300":"#5eead4","400":"#2dd4bf","500":"#14b8a6","600":"#0d9488","700":"#0f766e","800":"#115e59","900":"#134e4a","950":"#042f2e"},
            },
            fontFamily: {
                'body': ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                'sans': ['Space Grotesk', 'Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
            }
        }
    }
}
</script>
<style>
    /* Custom SaaS Theme */
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    h1, h2, h3, .brand-font { font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; }
    
    /* Smooth scrolling */
    html { scroll-behavior: smooth; }
    
    /* Gradient text helper */
    .gradient-text {
        background: linear-gradient(135deg, #0ea5e9, #14b8a6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    /* Card hover effects */
    .card-hover {
        transition: all 0.3s ease;
    }
    .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    }
    
    /* Gradient button */
    .btn-gradient {
        background: linear-gradient(135deg, #0ea5e9, #14b8a6);
        transition: all 0.3s ease;
    }
    .btn-gradient:hover {
        background: linear-gradient(135deg, #0284c7, #0f766e);
        box-shadow: 0 4px 15px rgba(14, 165, 233, 0.32);
    }
    
    /* Animated gradient border */
    @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    
    /* Pulse animation for health scores */
    @keyframes pulse-ring {
        0% { transform: scale(0.95); opacity: 0.7; }
        50% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.7; }
    }
    .pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }
    
    /* Fade in animation */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.6s ease-out; }
    
    /* Sidebar active state */
    .sidebar-active {
        background: linear-gradient(135deg, rgba(14,165,233,0.12), rgba(20,184,166,0.12));
        border-left: 3px solid #0ea5e9;
    }
    
    /* Glass effect */
    .glass {
        background: rgba(255,255,255,0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }
    .dark .glass {
        background: rgba(31,41,55,0.8);
    }
    
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
</style>
