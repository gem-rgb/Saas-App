<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block head_title %}Academy Grid{% endblock %}</title>
    {% include 'base/css.html' %}
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div class="antialiased min-h-screen">
        {% include 'dashboard/nav.html' %}
        {% include 'dashboard/sidebar.html' %}
        <main class="min-h-screen p-4 pt-24 md:ml-64">
            {% include 'base/messages.html' with messages=messages %}
            {% block content %}{% endblock content %}
        </main>
    </div>
    {% include 'base/js.html' %}
    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark') ? 'true' : 'false');
        }
        if (localStorage.getItem('darkMode') === 'false') {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>
</html>
