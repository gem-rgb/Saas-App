{% extends 'base.html' %}

{% block head_title %}Password Reset Sent - {{ block.super }}{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 p-8 text-center fade-in-up">
            <div class="w-16 h-16 mx-auto mb-5 rounded-2xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
                <svg class="w-8 h-8 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"></path><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Check your email</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-6">We've sent a password reset link to your email address. Please check your inbox.</p>
            <a href="{% url 'account_login' %}" class="inline-block btn-gradient text-white font-semibold py-3 px-6 rounded-xl shadow-lg text-sm">Back to Sign In</a>
        </div>
    </div>
</section>
{% endblock %}
