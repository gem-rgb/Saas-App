<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Academic assignment platform with student portals, tasker matching, trust verification, and manager moderation.">
    <meta property="og:title" content="{% block og_title %}Academic Assignment Platform{% endblock og_title %}">
    <meta property="og:description" content="Platform for students, taskers, managers, and admins focused on assignments and moderation.">
    <meta property="og:type" content="website">
    <title>{% block head_title %}Academic Assignment Platform{% endblock head_title %}</title>
    {% include 'base/css.html' %}
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: radial-gradient(circle at top, rgba(14,165,233,0.08), transparent 28%), linear-gradient(180deg, #f8fafc, #ffffff 50%, #f8fafc); }
        html.dark { color-scheme: dark; }
        .dark-toggle { cursor: pointer; transition: transform 0.3s ease; }
        .dark-toggle:hover { transform: rotate(15deg); }
    </style>
    {% block extra_css %}{% endblock extra_css %}
</head>
<body class="antialiased text-slate-900 dark:text-slate-100">
    {% include 'nav/navbar.html' %}
    {% include 'base/messages.html' with messages=messages %}
    {% block content %}{% endblock content %}
    {% include 'base/js.html' %}
    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark') ? 'true' : 'false');
        }
        if (localStorage.getItem('darkMode') === 'false') {
            document.documentElement.classList.remove('dark');
        }
    </script>
    {% block extra_js %}{% endblock extra_js %}
</body>
</html>
